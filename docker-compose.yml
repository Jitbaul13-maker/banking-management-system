services:

  postgres:
    image: postgres:17
    container_name: postgres-container
    restart: unless-stopped

    environment:
      POSTGRES_DB: testdb1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  banking-app:
    build: .
    container_name: banking-app
    restart: unless-stopped

    ports:
      - "8080:8080"

    env_file:
      - .env

    depends_on:
      - postgres

volumes:
  postgres-data:
